services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: markitdown-api
    ports:
      - "7860:7860"        # expõe no host para o tunnel alcançar
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - markitdown-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./markitdown-frontend
      dockerfile: Dockerfile.frontend
    container_name: markitdown-frontend
    ports:
      - "6699:80"          # expõe no host para o tunnel alcançar
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - markitdown-net

networks:
  markitdown-net:
    driver: bridge
